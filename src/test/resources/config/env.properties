# Non-secret defaults for the system under test (TTS API, stage).
# Override any value with -Dkey=value or the UPPER_SNAKE_CASE env var
# (e.g. API_BASE_URI). NEVER put tokens/secrets in this file — tenant secrets
# live in the git-ignored config/tenants.properties.

api.base.uri=https://stage-tts-api.laerdalblr.in
api.base.path=
api.auth.type=none
# TTS audio synthesis can take a few seconds; allow generous timeout.
api.timeout.ms=60000

# Endpoint paths (relative to api.base.uri)
token.path=/account/v1/token
tts.path=/tts/v1/tts
