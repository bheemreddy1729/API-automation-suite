# JUnit 5 platform configuration.

# Allure's TestExecutionListener and (later) the Xray enhanced XML reporter are
# auto-registered via the ServiceLoader, so no explicit registration is needed.

# Deterministic, sequential execution for now. Enable parallelism later once the
# suite grows (set enabled=true and pick a strategy).
junit.jupiter.execution.parallel.enabled=false

# --- Xray enhanced JUnit XML report (wired up in Phase D) ---
# The app.getxray:xray-junit-extensions listener emits an enriched JUnit XML that
# Xray Cloud consumes for requirement -> test -> result traceability.
# Configure its output here when integrating Xray. Reference:
#   https://github.com/Xray-App/xray-junit-extensions
# report.dir=target/xray-reports
# report.filename=xray-report
